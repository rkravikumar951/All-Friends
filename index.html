<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Neureal Friends</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 900px;
            background: #ffffff;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        header {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 10px;
            text-align: center;
        }

        table td {
            border: 1px solid #cccccc;
            padding: 10px;
            text-align: center;
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #2c3e50;
            text-align: center;
            font-size: 14px;
            color: #333333;
        }

        .datetime {
            margin-top: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        My Neureal Friends
    </header>

    <table>
        <thead>
            <tr>
                <th>Serial No</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Add Name</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Add Name</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Add Name</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Add Name</td>
            </tr>
        </tbody>
    </table>

    <footer>
        <div><strong>Ravi Kumar</strong></div>
        <div>Contact No: 9790795465</div>
        <div>Email: Rkravikumar951@gmail.com</div>
        <div class="datetime" id="datetime"></div>
    </footer>
</div>

<script>
    function updateDateTime() {
        const now = new Date();
        const options = { 
            day: '2-digit', month: 'long', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        };
        document.getElementById("datetime").innerText =
            "Current Date & Time: " + now.toLocaleString('en-IN', options);
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>

</body>
</html>
